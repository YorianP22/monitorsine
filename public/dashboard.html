<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Monitoring Presensi Korwil Sine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .loader { border-top-color: #0d6efd; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .bg-late { background-color: #fef9c3 !important; }
    .bg-outside { background-color: #fee2e2 !important; }
    .bg-psw { background-color: #d1fae5 !important; }
    @keyframes slideInLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .animate-slide-left { animation: slideInLeft 0.6s ease-out forwards; }
    .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ======================= FUNGSI PANGGIL API =======================
    const callAPI = async (action, ...args) => {
      const res = await fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, args })
      });
      return await res.json();
    };

    const lembagaList = [
      "SDN GENDOL 1","SDN GIRIKERTO 1","SDN GIRIKERTO 2","SDN HARGOSARI 1","SDN HARGOSARI 2",
      "SDN JAGIR 1","SDN TULAKAN 4","SDN JAGIR 2","SDN KUNIRAN 3","SDN JAGIR 3","SDN JAGIR 4",
      "SDN KAUMAN 1","SDN KETANGGUNG 1","SDN KUNIRAN 1","SDN KUNIRAN 2","SDN NGRENDENG 2",
      "SDN SINE 1","SDN PANDANSARI","SDN POCOL","SDN SINE 3","SDN SUMBEREJO 1","SDN SUMBERSARI 1",
      "SDN SUMBERSARI 2","SDN TULAKAN 1","SDN TULAKAN 2","SDN TULAKAN 3","SDN TULAKAN 6",
      "SDN WONOSARI 1","SDN WONOSARI 2"
    ];

    const extractFileIdFromDriveUrl = (url) => {
      if (!url) return null;
      let match = url.match(/\/file\/d\/([^\/]+)/);
      if (match) return match[1];
      match = url.match(/[?&]id=([^&]+)/);
      if (match) return match[1];
      match = url.match(/\/d\/([^\/]+)\/preview/);
      return match ? match[1] : null;
    };

    const checkLateStatus = (waktuStr, jenisPresensi) => {
      if (!waktuStr || !jenisPresensi || jenisPresensi.toLowerCase() !== 'datang') return false;
      try {
        const parts = waktuStr.split('pukul ');
        if (parts.length < 2) return false;
        const timeString = parts[1].trim();
        const [hh, mm] = timeString.split(/[\.\:]/);
        const totalMinutes = (parseInt(hh,10) * 60) + parseInt(mm,10);
        return totalMinutes > 420;
      } catch(e) { return false; }
    };

    const isOutsideRadius = (ketRadius) => ketRadius && ketRadius.toLowerCase().includes('luar radius');
    const isTidakHadir = (ketRadius) => ketRadius && (ketRadius.toLowerCase().includes('tidak hadir') || ketRadius.toLowerCase().includes('hari libur'));
    const normalizeName = (name) => name ? name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase() : '';

    const parsePresensiDate = (waktuStr) => {
      if (!waktuStr) return null;
      const parts = waktuStr.split('pukul')[0].trim();
      const dateParts = parts.split(', ')[1];
      if (!dateParts) return null;
      const [day, monthName, year] = dateParts.split(' ');
      const monthMap = { 'Januari':1,'Februari':2,'Maret':3,'April':4,'Mei':5,'Juni':6,'Juli':7,'Agustus':8,'September':9,'Oktober':10,'November':11,'Desember':12 };
      const month = monthMap[monthName];
      if (!month) return null;
      return `${day.padStart(2,'0')}/${month.toString().padStart(2,'0')}/${year}`;
    };

    const dateToNumber = (dateStr) => {
      if (!dateStr) return null;
      const [dd, mm, yyyy] = dateStr.split('/').map(Number);
      if (!dd || !mm || !yyyy) return null;
      return yyyy * 10000 + mm * 100 + dd;
    };

    const parseIjinDate = (dateStr) => {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-');
      if (!year || !month || !day) return null;
      return `${day.padStart(2,'0')}/${month.padStart(2,'0')}/${year}`;
    };

    const isDateInRange = (dateStr, startStr, endStr) => {
      if (!dateStr || !startStr || !endStr) return false;
      const toNum = (d) => { const [dd,mm,yyyy] = d.split('/').map(Number); return yyyy*10000 + mm*100 + dd; };
      const dateNum = toNum(dateStr);
      const startNum = toNum(startStr);
      const endNum = toNum(endStr);
      return dateNum >= startNum && dateNum <= endNum;
    };

    const enrichPresensiWithIjin = (presensi, ijin) => {
      if (!presensi || !ijin) return presensi;
      const approvedIjin = ijin.filter(item => item.Status && item.Status.toLowerCase() === 'disetujui');
      return presensi.map(p => {
        const psw = approvedIjin.some(item => {
          if (normalizeName(p['Nama Pegawai'] || '') !== normalizeName(item['Nama Pegawai'] || '')) return false;
          const presensiDate = parsePresensiDate(p['Waktu']);
          if (!presensiDate) return false;
          const startDate = parseIjinDate(item['Tanggal Awal']);
          const endDate = parseIjinDate(item['Tanggal Berakir']);
          if (!startDate || !endDate) return false;
          return isDateInRange(presensiDate, startDate, endDate);
        });
        return psw ? { ...p, isPSW: true, displayRadius: 'PSW' } : { ...p, isPSW: false, displayRadius: p['Keterangan Radius'] };
      });
    };

    const TablePagination = ({ currentPage, totalItems, rowsPerPage, onPageChange, onRowsPerPageChange }) => {
      const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
      const [jumpInput, setJumpInput] = useState('');
      const handleJump = () => {
        let pageNum = parseInt(jumpInput,10);
        if (isNaN(pageNum)) pageNum = 1;
        pageNum = Math.min(Math.max(1, pageNum), totalPages);
        onPageChange(pageNum);
        setJumpInput('');
      };
      return (
        <div className="flex flex-col sm:flex-row items-center justify-between mt-4 px-4 py-3 bg-white rounded-xl shadow-sm border gap-3">
          <div className="flex items-center gap-2">
            <span className="text-sm text-slate-600">Tampilkan</span>
            <select className="border rounded-lg px-2 py-1 text-sm" value={rowsPerPage} onChange={(e) => { const val = e.target.value === 'all' ? totalItems : Number(e.target.value); onRowsPerPageChange(val); onPageChange(1); }}>
              <option value={10}>10</option><option value={25}>25</option><option value={50}>50</option><option value={100}>100</option><option value="all">Semua</option>
            </select>
            <span className="text-sm text-slate-600">dari {totalItems} data</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => onPageChange(currentPage-1)} disabled={currentPage===1} className={`px-3 py-1 rounded-lg text-sm font-medium ${currentPage===1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Previous</button>
            <span className="text-sm text-slate-700">Halaman {currentPage} dari {totalPages}</span>
            <button onClick={() => onPageChange(currentPage+1)} disabled={currentPage===totalPages || totalPages===0} className={`px-3 py-1 rounded-lg text-sm font-medium ${currentPage===totalPages || totalPages===0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'}`}>Next</button>
          </div>
          <div className="flex items-center gap-2">
            <input type="number" min="1" max={totalPages} value={jumpInput} onChange={e=>setJumpInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleJump()} className="w-16 border rounded-lg px-2 py-1 text-sm text-center" placeholder="Halaman" />
            <button onClick={handleJump} className="px-3 py-1 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">Go</button>
          </div>
        </div>
      );
    };

    // ======================= KOMPONEN DASHBOARD =======================
    const Dashboard = ({ presensiData, ijinData, pegawaiData }) => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const totalLembaga = lembagaList.length;
      const totalPegawai = pegawaiData ? pegawaiData.length : 0;
      const jumlahDatang = presensiData.filter(p => (p['Jenis Presensi']||'').toLowerCase()==='datang').length;
      const jumlahPulang = presensiData.filter(p => (p['Jenis Presensi']||'').toLowerCase()==='pulang').length;
      const approvedIjin = (ijinData||[]).filter(ij=>ij.Status && ij.Status.toLowerCase()==='disetujui');
      const jumlahDinasLuar = approvedIjin.filter(ij=>(ij['Jenis Ijin']||'')==='Dinas Luar').length;
      const jumlahIjin = approvedIjin.filter(ij=>(ij['Jenis Ijin']||'')==='Ijin').length;
      const jumlahSakit = approvedIjin.filter(ij=>(ij['Jenis Ijin']||'')==='Sakit').length;
      const pswDiajukan = ijinData?ijinData.length:0;
      const pswDisetujui = approvedIjin.length;
      const pswDitolak = ijinData?ijinData.filter(ij=>ij.Status && ij.Status.toLowerCase()==='ditolak').length:0;
      useEffect(()=>{
        if(chartRef.current){
          if(chartInstance.current) chartInstance.current.destroy();
          chartInstance.current = new Chart(chartRef.current,{
            type:'bar',
            data:{ labels:['Datang','Pulang','Dinas Luar','Ijin','Sakit'], datasets:[{ label:'Jumlah', data:[jumlahDatang,jumlahPulang,jumlahDinasLuar,jumlahIjin,jumlahSakit], backgroundColor:['#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec489a'], borderRadius:8 }] },
            options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'top'}, tooltip:{callbacks:{label:(ctx)=>`${ctx.raw} orang`}} } }
          });
        }
        return ()=>{if(chartInstance.current) chartInstance.current.destroy();};
      },[jumlahDatang,jumlahPulang,jumlahDinasLuar,jumlahIjin,jumlahSakit]);
      return (
        <div className="space-y-8">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-l-blue-500"><div className="flex items-center justify-between"><div><p className="text-xs text-slate-500 font-bold uppercase">Total Lembaga</p><p className="text-3xl font-black text-slate-800">{totalLembaga}</p></div><div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center"><i className="fas fa-building text-blue-600 text-xl"></i></div></div></div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-l-emerald-500"><div className="flex items-center justify-between"><div><p className="text-xs text-slate-500 font-bold uppercase">Total Pegawai</p><p className="text-3xl font-black text-slate-800">{totalPegawai}</p></div><div className="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center"><i className="fas fa-users text-emerald-600 text-xl"></i></div></div></div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-l-amber-500"><div className="flex items-center justify-between"><div><p className="text-xs text-slate-500 font-bold uppercase">Absen Datang</p><p className="text-3xl font-black text-slate-800">{jumlahDatang}</p></div><div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center"><i className="fas fa-sign-in-alt text-amber-600 text-xl"></i></div></div></div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-l-orange-500"><div className="flex items-center justify-between"><div><p className="text-xs text-slate-500 font-bold uppercase">Absen Pulang</p><p className="text-3xl font-black text-slate-800">{jumlahPulang}</p></div><div className="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center"><i className="fas fa-sign-out-alt text-orange-600 text-xl"></i></div></div></div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white p-6 rounded-2xl shadow-sm border"><h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><i className="fas fa-chart-bar text-blue-500"></i> Grafik Kehadiran & Ijin</h3><div className="h-72"><canvas ref={chartRef}></canvas></div></div>
            <div className="bg-white p-6 rounded-2xl shadow-sm border"><h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><i className="fas fa-file-signature text-purple-500"></i> Statistik PSW</h3><div className="space-y-6"><div className="grid grid-cols-3 gap-4"><div className="text-center p-3 bg-blue-50 rounded-xl"><p className="text-xs text-blue-600 font-bold">Diajukan</p><p className="text-2xl font-black text-blue-700">{pswDiajukan}</p></div><div className="text-center p-3 bg-green-50 rounded-xl"><p className="text-xs text-green-600 font-bold">Disetujui</p><p className="text-2xl font-black text-green-700">{pswDisetujui}</p></div><div className="text-center p-3 bg-red-50 rounded-xl"><p className="text-xs text-red-600 font-bold">Ditolak</p><p className="text-2xl font-black text-red-700">{pswDitolak}</p></div></div><div className="pt-4 border-t"><div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold text-slate-600">Dinas Luar</span><span className="text-lg font-black text-indigo-600">{jumlahDinasLuar}</span></div><div className="flex justify-between items-center mb-2"><span className="text-sm font-semibold text-slate-600">Ijin</span><span className="text-lg font-black text-indigo-600">{jumlahIjin}</span></div><div className="flex justify-between items-center"><span className="text-sm font-semibold text-slate-600">Sakit</span><span className="text-lg font-black text-indigo-600">{jumlahSakit}</span></div></div></div></div>
          </div>
        </div>
      );
    };

    // ======================= KOMPONEN MONITORING PRESENSI =======================
    const MonitoringPresensi = ({ data, refreshData, userRole, userLembaga }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [filterNama, setFilterNama] = useState('');
      const [editingRow, setEditingRow] = useState(null);
      const [editVal, setEditVal] = useState('');
      const [modalImg, setModalImg] = useState(null);
      const [modalMap, setModalMap] = useState(null);
      const [currentPage, setCurrentPage] = useState(1);
      const [rowsPerPage, setRowsPerPage] = useState(10);
      const [showRangeModal, setShowRangeModal] = useState(false);
      const [rangeStart, setRangeStart] = useState('');
      const [rangeEnd, setRangeEnd] = useState('');
      const [rangeStatus, setRangeStatus] = useState('Libur');
      const [rangeKeterangan, setRangeKeterangan] = useState('');
      const [showCRUDModal, setShowCRUDModal] = useState(false);
      const [crudMode, setCrudMode] = useState('add');
      const [currentRowIndex, setCurrentRowIndex] = useState(null);
      const [formValues, setFormValues] = useState({ 'Hari Tanggal':'','Waktu':'','Jenis Presensi':'','Nama Lembaga':'','Nama Pegawai':'','Nip':'','Bukti Dukung':'','Latitude':'','Longitude':'','Jarak Absen':'','Keterangan Radius':'','Keterangan Bukti':'' });
      const canEditLembaga = userRole==='Admin'||userRole==='User'||userRole==='Superuser';
      const canManageLibur = userRole==='Admin'||userRole==='Superuser';
      const canViewBukti = userRole==='Admin'||userRole==='User'||userRole==='Superuser';
      const isAdmin = userRole==='Admin';
      
      const normalizeCoordinate = (coord) => {
        if (coord === null || coord === undefined || coord === '') return '';
        return coord.toString().replace(/,/g, '.').trim();
      };
      
      useEffect(()=>{ if(!canEditLembaga && userLembaga) setFilterLembaga(userLembaga); },[canEditLembaga,userLembaga]);
      const filtered = useMemo(()=>data.filter(i=>(i['Nama Lembaga']||'').toLowerCase().includes(filterLembaga.toLowerCase()) && (i['Nama Pegawai']||'').toLowerCase().includes(filterNama.toLowerCase())),[data,filterLembaga,filterNama]);
      useEffect(()=>setCurrentPage(1),[filterLembaga,filterNama]);
      const totalItems = filtered.length;
      useEffect(()=>{ if(rowsPerPage>totalItems && totalItems>0) setRowsPerPage(totalItems); else if(totalItems===0) setRowsPerPage(10); },[totalItems,rowsPerPage]);
      const effectiveRowsPerPage = rowsPerPage===totalItems?totalItems:rowsPerPage;
      const paginatedData = filtered.slice((currentPage-1)*effectiveRowsPerPage, currentPage*effectiveRowsPerPage);
      const handleSaveKet = async(idx)=>{ const res=await callAPI('updateKeteranganBukti',idx,editVal); if(res.success){ Swal.fire({icon:'success',title:'Tersimpan',timer:1000,showConfirmButton:false}); setEditingRow(null); refreshData(); } };
      const openAddModal=()=>{ setCrudMode('add'); setCurrentRowIndex(null); setFormValues({ 'Hari Tanggal':'','Waktu':'','Jenis Presensi':'','Nama Lembaga':'','Nama Pegawai':'','Nip':'','Bukti Dukung':'','Latitude':'','Longitude':'','Jarak Absen':'','Keterangan Radius':'','Keterangan Bukti':'' }); setShowCRUDModal(true); };
      const openEditModal=(item)=>{ setCrudMode('edit'); setCurrentRowIndex(item._rowIndex); setFormValues({ 'Hari Tanggal':item['Hari Tanggal']||'','Waktu':item['Waktu']||'','Jenis Presensi':item['Jenis Presensi']||'','Nama Lembaga':item['Nama Lembaga']||'','Nama Pegawai':item['Nama Pegawai']||'','Nip':item['Nip']||'','Bukti Dukung':item['Bukti Dukung']||'','Latitude':item['Latitude']||'','Longitude':item['Longitude']||'','Jarak Absen':item['Jarak Absen']||'','Keterangan Radius':item['Keterangan Radius']||'','Keterangan Bukti':item['Keterangan Bukti']||'' }); setShowCRUDModal(true); };
      const handleDelete=async(rowIndex,namaPegawai)=>{ const confirm=await Swal.fire({title:'Hapus Presensi?',text:`Yakin ingin menghapus data presensi ${namaPegawai}?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Hapus'}); if(confirm.isConfirmed){ const loading=Swal.fire({title:'Menghapus...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); const res=await callAPI('deletePresensi',rowIndex); loading.close(); if(res.success){ Swal.fire({icon:'success',title:'Terhapus',timer:1500,showConfirmButton:false}); refreshData(); } else Swal.fire('Error','Gagal menghapus data','error'); } };
      const handleSubmitCRUD=async()=>{ if(!formValues['Waktu']||!formValues['Jenis Presensi']||!formValues['Nama Pegawai']){ Swal.fire('Peringatan','Waktu, Jenis Presensi, dan Nama Pegawai wajib diisi.','warning'); return; } const loading=Swal.fire({title:'Menyimpan...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()}); let res; if(crudMode==='add') res=await callAPI('addPresensi',formValues); else res=await callAPI('updatePresensi',currentRowIndex,formValues); loading.close(); if(res.success){ Swal.fire({icon:'success',title:crudMode==='add'?'Data Ditambahkan':'Data Diperbarui',timer:1500,showConfirmButton:false}); setShowCRUDModal(false); refreshData(); } else Swal.fire('Error','Gagal menyimpan data','error'); };
      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center"><h3 className="font-bold text-lg text-slate-700 w-full md:w-auto mr-4">Filter Data Presensi:</h3><input type="text" placeholder="Cari Lembaga..." className={`border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500 ${!canEditLembaga?'bg-slate-100 cursor-not-allowed':''}`} value={filterLembaga} onChange={e=>canEditLembaga&&setFilterLembaga(e.target.value)} disabled={!canEditLembaga} /><input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterNama} onChange={e=>setFilterNama(e.target.value)} />{!canEditLembaga&&userLembaga&&<span className="text-xs text-blue-600 bg-blue-50 px-2 py-1 rounded-full"><i className="fas fa-lock mr-1"></i> Filter lembaga dikunci</span>}{canManageLibur&&<button onClick={()=>setShowRangeModal(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center gap-2 transition"><i className="fas fa-calendar-alt"></i> Atur Libur Manual</button>}{isAdmin&&<button onClick={openAddModal} className="bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-xl font-bold shadow-sm flex items-center gap-2 transition"><i className="fas fa-plus-circle"></i> Tambah Presensi</button>}</div>

      const [rowsPerPage, setRowsPerPage] = useState(10);
      const canManage = userRole==='Admin'||userRole==='Superuser';
      const fetchData = async()=>{ setLoading(true); const res=await callAPI('getPegawai'); setData(res||[]); setLoading(false); };
      useEffect(()=>{ fetchData(); },[]);
      const filtered = useMemo(()=>data.filter(item=>(item['Name Lembaga']||'').toLowerCase().includes(filterLembaga.toLowerCase()) && (item['Name Pegawai']||'').toLowerCase().includes(filterNama.toLowerCase())),[data,filterLembaga,filterNama]);
      useEffect(()=>setCurrentPage(1),[filterLembaga,filterNama]);
      const totalItems = filtered.length;
      useEffect(()=>{ if(rowsPerPage>totalItems && totalItems>0) setRowsPerPage(totalItems); else if(totalItems===0) setRowsPerPage(10); },[totalItems,rowsPerPage]);
      const effectiveRowsPerPage = rowsPerPage===totalItems?totalItems:rowsPerPage;
      const paginatedData = filtered.slice((currentPage-1)*effectiveRowsPerPage, currentPage*effectiveRowsPerPage);
      const openModal=(item=null)=>{ if(!canManage){ Swal.fire('Akses Ditolak','Hanya Admin dan Superuser yang dapat menambah/mengedit data pegawai.','warning'); return; } if(item){ setFormData({ 'Username (MP/ID)':item['Username (MP/ID)']||'', 'Password':item['Password']||'', 'Name Lembaga':item['Name Lembaga']||'', 'Name Pegawai':item['Name Pegawai']||'', 'Latitude':item['Latitude']||'', 'Longitude':item['Longitude']||'', 'Radius (m)':item['Radius (m)']||'', 'Role':item['Role']||'' }); setEditingRow(item._rowIndex); }else{ setFormData({ 'Username (MP/ID)':'','Password':'','Name Lembaga':'','Name Pegawai':'','Latitude':'','Longitude':'','Radius (m)':'','Role':'' }); setEditingRow(null); } setModalOpen(true); };
      const handleInputChange=(e)=>setFormData({...formData,[e.target.name]:e.target.value});
      const handleSubmit=async()=>{ if(!formData['Username (MP/ID)']||!formData['Password']||!formData['Name Pegawai']){ Swal.fire('Peringatan','Username, Password, dan Nama Pegawai harus diisi','warning'); return; } setLoading(true); let res; if(editingRow) res=await callAPI('updatePegawai',editingRow,formData); else res=await callAPI('addPegawai',formData); if(res.success){ Swal.fire({icon:'success',title:'Berhasil',timer:1500,showConfirmButton:false}); setModalOpen(false); fetchData(); if(refreshParent) refreshParent(); }else{ Swal.fire('Error','Gagal menyimpan data','error'); } setLoading(false); };
      const handleDelete=async(rowIndex,nama)=>{ if(!canManage){ Swal.fire('Akses Ditolak','Hanya Admin dan Superuser yang dapat menghapus data pegawai.','warning'); return; } const confirm=await Swal.fire({title:'Hapus Pegawai?',text:`Yakin ingin menghapus ${nama}?`,icon:'warning',showCancelButton:true,confirmButtonColor:'#d33',cancelButtonColor:'#334155',confirmButtonText:'Ya, Hapus'}); if(confirm.isConfirmed){ setLoading(true); const res=await callAPI('deletePegawai',rowIndex); if(res.success){ Swal.fire('Terhapus','Data pegawai berhasil dihapus','success'); fetchData(); }else{ Swal.fire('Error','Gagal menghapus','error'); } setLoading(false); } };
      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap justify-between items-center"><h3 className="font-bold text-xl text-slate-800 flex items-center gap-2"><i className="fas fa-database text-blue-600"></i> Database Pegawai</h3>{canManage?(<button onClick={()=>openModal()} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 transition"><i className="fas fa-plus-circle"></i> Tambah Pegawai</button>):(<div className="text-sm text-red-600 font-semibold bg-red-50 px-4 py-2 rounded-xl border border-red-200"><i className="fas fa-lock mr-2"></i>Hanya Admin/Superuser dapat mengelola data</div>)}</div>
          <div className="bg-white p-5 rounded-2xl shadow-sm border flex flex-wrap gap-4 items-center"><h4 className="font-bold text-slate-700 mr-2">Filter:</h4><input type="text" placeholder="Cari Lembaga..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterLembaga} onChange={e=>setFilterLembaga(e.target.value)} /><input type="text" placeholder="Cari Nama Pegawai..." className="border p-3 rounded-xl flex-1 text-sm outline-none focus:border-blue-500" value={filterNama} onChange={e=>setFilterNama(e.target.value)} /></div>
          <div className="bg-white rounded-2xl shadow-sm border overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-blue-700 text-white border-b"><tr><th className="px-4 py-4">Username (MP/ID)</th><th className="px-4 py-4">Password</th><th className="px-4 py-4">Lembaga</th><th className="px-4 py-4">Nama Pegawai</th><th className="px-4 py-4">Latitude</th><th className="px-4 py-4">Longitude</th><th className="px-4 py-4">Radius (m)</th><th className="px-4 py-4">Role</th>{canManage&&<th className="px-4 py-4 text-center">Aksi</th>}</tr></thead><tbody className="divide-y">{paginatedData.map((item,i)=>(<tr key={i} className="hover:bg-slate-50 transition-colors"><td className="px-4 py-3 font-medium">{item['Username (MP/ID)']}</td><td className="px-4 py-3">••••••</td><td className="px-4 py-3">{item['Name Lembaga']}</td><td className="px-4 py-3 font-bold">{item['Name Pegawai']}</td><td className="px-4 py-3">{item['Latitude']}</td><td className="px-4 py-3">{item['Longitude']}</td><td className="px-4 py-3">{item['Radius (m)']}</td><td className="px-4 py-3"><span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-[10px] font-black uppercase">{item['Role']}</span></td>{canManage&&(<td className="px-4 py-3"><div className="flex justify-center gap-2"><button onClick={()=>openModal(item)} className="text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-lg flex items-center justify-center transition"><i className="fas fa-edit"></i></button><button onClick={()=>handleDelete(item._rowIndex,item['Name Pegawai'])} className="text-red-600 hover:bg-red-50 w-8 h-8 rounded-lg flex items-center justify-center transition"><i className="fas fa-trash-alt"></i></button></div></td>)}</tr>))}{paginatedData.length===0&&(<tr><td colSpan={canManage?9:8} className="text-center py-10 text-slate-400 font-medium italic">Tidak ada data pegawai</td></tr>)}</tbody></table></div><TablePagination currentPage={currentPage} totalItems={totalItems} rowsPerPage={rowsPerPage} onPageChange={setCurrentPage} onRowsPerPageChange={setRowsPerPage} /></div>
          {modalOpen&&canManage&&(<div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4" onClick={()=>setModalOpen(false)}><div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto" onClick={e=>e.stopPropagation()}><div className="p-6 border-b flex justify-between items-center bg-blue-700 text-white sticky top-0"><h4 className="text-xl font-bold flex items-center gap-2"><i className={`fas ${editingRow?'fa-edit':'fa-user-plus'} text-blue-200`}></i>{editingRow?'Edit Pegawai':'Tambah Pegawai Baru'}</h4><button onClick={()=>setModalOpen(false)} className="text-3xl leading-none hover:text-slate-300">&times;</button></div><div className="p-6 space-y-4"><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Username (MP/ID) *</label><input type="text" name="Username (MP/ID)" value={formData['Username (MP/ID)']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Password *</label><input type="text" name="Password" value={formData['Password']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Lembaga</label><select name="Name Lembaga" value={formData['Name Lembaga']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"><option value="">Pilih Lembaga</option>{lembagaList.map(lem=><option key={lem} value={lem}>{lem}</option>)}</select></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Nama Pegawai *</label><input type="text" name="Name Pegawai" value={formData['Name Pegawai']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Latitude</label><input type="text" name="Latitude" value={formData['Latitude']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Longitude</label><input type="text" name="Longitude" value={formData['Longitude']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Radius (m)</label><input type="text" name="Radius (m)" value={formData['Radius (m)']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" /></div><div><label className="block text-xs font-bold uppercase text-slate-500 mb-1">Role</label><select name="Role" value={formData['Role']} onChange={handleInputChange} className="w-full border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"><option value="">Pilih Role</option><option value="Admin">Admin</option><option value="Superuser">Superuser</option><option value="User">User</option><option value="Supervisor">Supervisor</option></select></div></div><div className="flex justify-end gap-3 pt-4 border-t"><button onClick={()=>setModalOpen(false)} className="px-6 py-3 border-2 border-slate-300 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">Batal</button><button onClick={handleSubmit} disabled={loading} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg hover:bg-blue-700 transition flex items-center gap-2 disabled:opacity-50">{loading?'Menyimpan...':<><i className="fas fa-save"></i> Simpan</>}</button></div></div></div></div>)}
        </div>
      );
    };

    // ======================= KOMPONEN MONITORING & EXPORT =======================
    const MonitoringExport = ({ presensiData, ijinData, pegawaiData, refreshData, userRole }) => {
      const [filterLembaga, setFilterLembaga] = useState('');
      const [dateStart, setDateStart] = useState('');
      const [dateEnd, setDateEnd] = useState('');
      const isAdmin = userRole === 'Admin';
      const canExport = userRole === 'Admin' || userRole === 'User' || userRole === 'Superuser';
      const setThisMonth = () => { const now = new Date(); const firstDay = new Date(now.getFullYear(), now.getMonth(), 1); const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0); setDateStart(firstDay.toISOString().split('T')[0]); setDateEnd(lastDay.toISOString().split('T')[0]); };
      const clearDateFilter = () => { setDateStart(''); setDateEnd(''); };

      const getFilteredData = (lembagaFilter = null) => {
        let filtered = [...presensiData];
        const targetLembaga = lembagaFilter !== null ? lembagaFilter : filterLembaga;
        if (targetLembaga) filtered = filtered.filter(i => (i['Nama Lembaga'] || '') === targetLembaga);
        if (dateStart && dateEnd) {
          const startNum = dateToNumber(parseIjinDate(dateStart));
          const endNum = dateToNumber(parseIjinDate(dateEnd));
          if (startNum && endNum) filtered = filtered.filter(item => { const presensiDate = parsePresensiDate(item['Waktu']); return isDateInRangeNum(presensiDate, startNum, endNum); });
        } else if (dateStart) {
          const startNum = dateToNumber(parseIjinDate(dateStart));
          if (startNum) filtered = filtered.filter(item => { const presensiDate = parsePresensiDate(item['Waktu']); const dnum = dateToNumber(presensiDate); return dnum >= startNum; });
        } else if (dateEnd) {
          const endNum = dateToNumber(parseIjinDate(dateEnd));
          if (endNum) filtered = filtered.filter(item => { const presensiDate = parsePresensiDate(item['Waktu']); const dnum = dateToNumber(presensiDate); return dnum <= endNum; });
        }
        return filtered;
      };

      const getEmployeesByLembaga = (lembaga) => {
        if (!pegawaiData) return [];
        return pegawaiData.filter(p => (p['Name Lembaga'] || '') === lembaga);
      };

      const extractTime = (waktuStr) => {
        if (!waktuStr) return null;
        const match = waktuStr.match(/pukul\s*([\d\.\:]+)/i);
        return match ? match[1] : null;
      };

      const isPSWActive = (employeeName, dateStr) => {
        if (!ijinData) return false;
        const approvedIjin = ijinData.filter(ij => ij.Status && ij.Status.toLowerCase() === 'disetujui');
        const normalizedEmployee = normalizeName(employeeName);
        return approvedIjin.some(ij => {
          const normalizedIjin = normalizeName(ij['Nama Pegawai'] || '');
          if (normalizedEmployee !== normalizedIjin) return false;
          const start = parseIjinDate(ij['Tanggal Awal']);
          const end = parseIjinDate(ij['Tanggal Berakir']);
          if (!start || !end) return false;
          return isDateInRange(dateStr, start, end);
        });
      };

      const getPSWJenis = (employeeName, dateStr) => {
        if (!ijinData) return null;
        const approvedIjin = ijinData.filter(ij => ij.Status && ij.Status.toLowerCase() === 'disetujui');
        const normalizedEmployee = normalizeName(employeeName);
        const match = approvedIjin.find(ij => {
          const normalizedIjin = normalizeName(ij['Nama Pegawai'] || '');
          if (normalizedEmployee !== normalizedIjin) return false;
          const start = parseIjinDate(ij['Tanggal Awal']);
          const end = parseIjinDate(ij['Tanggal Berakir']);
          if (!start || !end) return false;
          return isDateInRange(dateStr, start, end);
        });
        return match ? match['Jenis Ijin'] : null;
      };

      const exportDaftarHadirRingkas = () => {
        if (!dateStart || !dateEnd) {
          Swal.fire('Periode Tanggal Belum Dipilih', 'Silakan pilih rentang tanggal terlebih dahulu untuk mengekspor Daftar Hadir Ringkas.', 'warning');
          return;
        }
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF('l', 'mm', 'a4');
          const startDateObj = new Date(dateStart);
          const endDateObj = new Date(dateEnd);
          const allDates = [];
          let currentDate = new Date(startDateObj);
          while (currentDate <= endDateObj) {
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${dd}/${mm}/${yyyy}`;
            const dayName = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][currentDate.getDay()];
            allDates.push({ dateStr, dayName: dayName.substring(0,3), dayNumber: parseInt(dd,10), fullDate: new Date(currentDate) });
            currentDate.setDate(currentDate.getDate() + 1);
          }
          if (allDates.length === 0) return;
          const ranges = [
            { name: 'Tanggal 1-10', minDay: 1, maxDay: 10 },
            { name: 'Tanggal 11-20', minDay: 11, maxDay: 20 },
            { name: 'Tanggal 21-31', minDay: 21, maxDay: 31 }
          ];
          const dateGroups = ranges.map(range => ({ ...range, dates: allDates.filter(d => d.dayNumber >= range.minDay && d.dayNumber <= range.maxDay) })).filter(group => group.dates.length > 0);
          
          const globalPresensi = getFilteredData(null);
          const globalPresensiMap = new Map();
          globalPresensi.forEach(p => {
            const date = parsePresensiDate(p['Waktu']);
            if (!date) return;
            const normName = normalizeName(p['Nama Pegawai'] || '');
            const key = `${normName}|${date}`;
            if (!globalPresensiMap.has(key)) globalPresensiMap.set(key, { datang: null, pulang: null });
            const entry = globalPresensiMap.get(key);
            const jenis = (p['Jenis Presensi'] || '').toLowerCase();
            const time = extractTime(p['Waktu']);
            const radius = p.displayRadius || p['Keterangan Radius'] || '';
            const isLibur = radius.toLowerCase().includes('libur') || radius.toLowerCase().includes('cuti bersama');
            const late = (jenis === 'datang') ? checkLateStatus(p['Waktu'], 'datang') : false;
            const recordData = { time, radius, isLibur, late };
            if (jenis === 'datang') {
              entry.datang = recordData;
            } else if (jenis === 'pulang') {
              entry.pulang = recordData;
            }
          });
          
          const isTHByRecord = (typeRecord) => {
            if (!typeRecord) return true;
            if (typeRecord.radius && isTidakHadir(typeRecord.radius)) return true;
            return false;
          };
          
          const lembagasToExport = filterLembaga ? [filterLembaga] : [...lembagaList];
          let firstLembaga = true;
          for (let lem of lembagasToExport) {
            const employees = getEmployeesByLembaga(lem);
            if (employees.length === 0) continue;
            const employeeDetails = employees.map(emp => ({ nama: emp['Name Pegawai'] || '', username: emp['Username (MP/ID)'] || '-' })).sort((a,b) => a.nama.localeCompare(b.nama));
            
            const getCellValue = (empName, dateStr, type) => {
              const [dd, mm, yyyy] = dateStr.split('/');
              const dateObj = new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd));
              if (dateObj.getDay() === 0 || dateObj.getDay() === 6) return { text: 'LIBUR', style: 'libur', late: false };
              const normName = normalizeName(empName);
              const key = `${normName}|${dateStr}`;
              const presEntry = globalPresensiMap.get(key);
              const pswActive = isPSWActive(empName, dateStr);
              if (pswActive) {
                const jenis = getPSWJenis(empName, dateStr);
                return { text: `PSW${jenis ? ` (${jenis})` : ''}`, style: 'psw', late: false };
              }
              let hasLibur = false;
              if (presEntry) {
                if ((presEntry.datang && presEntry.datang.isLibur) || (presEntry.pulang && presEntry.pulang.isLibur)) hasLibur = true;
              }
              if (hasLibur) return { text: 'LIBUR', style: 'libur', late: false };
              
              let record = null;
              if (type === 'D') record = presEntry ? presEntry.datang : null;
              else record = presEntry ? presEntry.pulang : null;
              
              if (isTHByRecord(record)) return { text: 'TH', style: 'th', late: false };
              if (record && record.time) return { text: record.time, style: record.late ? 'late' : 'normal', late: record.late };
              return { text: 'TH', style: 'th', late: false };
            };
            
            const buildTableForGroup = (group, startY) => {
              const { dates, name } = group;
              const headerRow1 = [
                { content: 'NO', rowSpan: 2, styles: { halign: 'center', valign: 'middle' } },
                { content: 'NAMA PEGAWAI\n(NIP/NUPTK)', rowSpan: 2, styles: { halign: 'center', valign: 'middle', fontSize: 7 } }
              ];
              dates.forEach(d => { headerRow1.push({ content: `${d.dayNumber}\n${d.dayName}`, colSpan: 2, styles: { halign: 'center', valign: 'middle', fontSize: 7 } }); });
              const headerRow2 = [{ content: '', colSpan: 2, styles: { fillColor: [30,64,175] } }];
              dates.forEach(() => { headerRow2.push({ content: 'D', styles: { halign: 'center' } }); headerRow2.push({ content: 'P', styles: { halign: 'center' } }); });
              const bodyRows = [];
              employeeDetails.forEach((emp, idx) => {
                const rowCells = [
                  { content: idx+1, styles: { halign: 'center' } },
                  { content: `${emp.nama}\n${emp.username}`, styles: { fontSize: 6 } }
                ];
                dates.forEach(d => {
                  const datang = getCellValue(emp.nama, d.dateStr, 'D');
                  const pulang = getCellValue(emp.nama, d.dateStr, 'P');
                  const cellD = { content: datang.text, styles: { fontSize: 6, halign: 'center' } };
                  const cellP = { content: pulang.text, styles: { fontSize: 6, halign: 'center' } };
                  if (datang.style === 'th') { cellD.styles.textColor = [255,0,0]; cellD.styles.fontStyle = 'bold'; }
                  if (pulang.style === 'th') { cellP.styles.textColor = [255,0,0]; cellP.styles.fontStyle = 'bold'; }
                  if (datang.style === 'late') { cellD.styles.fillColor = [254,249,195]; cellD.styles.textColor = [0,0,0]; }
                  if (pulang.style === 'late') { cellP.styles.fillColor = [254,249,195]; cellP.styles.textColor = [0,0,0]; }
                  if (datang.style === 'psw') cellD.styles.fillColor = [209,250,229];
                  if (pulang.style === 'psw') cellP.styles.fillColor = [209,250,229];
                  if (datang.style === 'libur') cellD.styles.fillColor = [255,204,204];
                  if (pulang.style === 'libur') cellP.styles.fillColor = [255,204,204];
                  rowCells.push(cellD, cellP);
                });
                bodyRows.push(rowCells);
              });
              doc.autoTable({
                head: [headerRow1, headerRow2],
                body: bodyRows,
                theme: 'grid',
                startY: startY,
                headStyles: { fillColor: [30,64,175], textColor: 255, fontStyle: 'bold', fontSize: 7 },
                bodyStyles: { fontSize: 6 },
                columnStyles: { 0: { cellWidth: 8 }, 1: { cellWidth: 45 } },
                margin: { left: 10, right: 10 },
                didDrawPage: (data) => {
                  doc.setFontSize(7);
                  doc.setTextColor(100);
                  doc.text(`Hal ${data.pageNumber}`, doc.internal.pageSize.getWidth() - 20, doc.internal.pageSize.getHeight() - 10);
                }
              });
              return doc.lastAutoTable.finalY + 6;
            };
            const bulanNama = startDateObj.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            if (!firstLembaga) doc.addPage();
            else firstLembaga = false;
            doc.setFontSize(12); doc.setTextColor(30,41,59); doc.setFont(undefined, 'bold');
            doc.text("DAFTAR HADIR PEGAWAI BULANAN", 14, 15);
            doc.setFontSize(8); doc.setTextColor(80);
            doc.text(`BULAN: ${bulanNama}`, 14, 22);
            doc.text(`UNIT KERJA: ${lem}`, 14, 28);
            doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, 14, 40);
            let currentY = 46;
            for (let i=0; i<dateGroups.length; i++) {
              if (i>0) doc.addPage();
              const yStart = (i===0) ? currentY : 20;
              doc.setFontSize(9); doc.setTextColor(0,51,102); doc.setFont(undefined, 'bold');
              doc.text(dateGroups[i].name, 14, yStart);
              currentY = buildTableForGroup(dateGroups[i], yStart + 6);
            }
            for (let i=1; i<=doc.internal.getNumberOfPages(); i++) {
              doc.setPage(i);
              doc.setFontSize(6); doc.setTextColor(100);
              doc.text("(CATATAN: Daftar Presensi. Keterangan TH: Tidak Hadir / Alpa, Latar Kuning = Terlambat >07:00)", 14, doc.internal.pageSize.getHeight() - 8);
              doc.text("KETERANGAN: D (Datang), P (Pulang), TH (Tidak Hadir)", doc.internal.pageSize.getWidth() - 80, doc.internal.pageSize.getHeight() - 8);
            }
          }
          const now = new Date();
          const tanggal = now.toISOString().slice(0,10);
          const waktu = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\./g, '-');
          const lembagaForFilename = filterLembaga ? filterLembaga.replace(/\s/g, '_') : "Semua_Lembaga";
          doc.save(`${lembagaForFilename}_Daftar_Hadir_${tanggal}_${waktu}.pdf`);
        } catch (err) { console.error(err); Swal.fire('Error Ekspor', 'Terjadi kesalahan saat membuat PDF. Periksa konsol.', 'error'); }
      };

      const generateLaporanPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        let filteredData = getFilteredData();
        const isAllLembaga = !filterLembaga;
        doc.setFontSize(18); doc.setTextColor(30,41,59); doc.text("Laporan Monitoring Presensi Korwil Sine", 14, 15);
        doc.setFontSize(10); doc.setTextColor(100); doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 22);

        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
          <div className="border-b border-slate-100 pb-5 mb-6"><h3 className="text-xl font-bold text-slate-800">Form Pengajuan PSW</h3><p className="text-sm text-slate-500 mt-1">Lembaga: <span className="font-semibold text-blue-600">{user.lembaga}</span></p></div>
          <form onSubmit={handleSubmit} className="space-y-6"><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="md:col-span-2"><label className="block text-sm font-semibold text-slate-700 mb-2">Pilih Pegawai</label><select required value={formData.nip} onChange={e=>setFormData({...formData,nip:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none"><option value="" disabled>-- Pilih Pegawai --</option>{pegawaiList.map(p=><option key={p.nip} value={p.nip}>{p.nama} (NIP: {p.nip})</option>)}</select></div><div className="md:col-span-2"><label className="block text-sm font-semibold text-slate-700 mb-2">Kategori Pengajuan</label><div className="grid grid-cols-1 sm:grid-cols-3 gap-4">{['Sakit','Ijin','Dinas Luar'].map(item=>{ const isSelected=formData.jenis===item; return (<label key={item} className={`cursor-pointer border-2 rounded-xl p-4 flex flex-col items-center justify-center transition-all ${isSelected?'bg-blue-50 border-blue-500 text-blue-700 shadow-md':'bg-white border-slate-100 hover:border-slate-300 text-slate-500 hover:bg-slate-50'}`}><input type="radio" name="jenis" value={item} className="hidden" checked={isSelected} onChange={e=>setFormData({...formData,jenis:e.target.value})} required /><div className={`w-12 h-12 rounded-full mb-2 flex items-center justify-center text-xl ${isSelected?'bg-blue-100':'bg-slate-100'}`}><i className={`fas ${item==='Sakit'?'fa-briefcase-medical':item==='Ijin'?'fa-envelope-open-text':'fa-car-side'}`}></i></div><span className="font-bold text-sm">{item}</span></label>); })}</div></div><div><label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Mulai</label><input type="date" required value={formData.tglAwal} onChange={e=>setFormData({...formData,tglAwal:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" /></div><div><label className="block text-sm font-semibold text-slate-700 mb-2">Tanggal Selesai</label><input type="date" required min={formData.tglAwal} value={formData.tglAkhir} onChange={e=>setFormData({...formData,tglAkhir:e.target.value})} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" /></div><div className="md:col-span-2"><label className="block text-sm font-semibold text-slate-700 mb-2">Lampiran Bukti Dukung (PDF)</label><div className={`border-2 border-dashed rounded-2xl p-8 flex flex-col items-center justify-center transition-all relative ${file?'border-green-400 bg-green-50':'border-slate-300 bg-slate-50 hover:bg-slate-100'}`}><input id="fileInput" type="file" accept=".pdf" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required />{file?(<div className="text-center"><div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fas fa-file-check"></i></div><p className="font-bold text-slate-800 text-sm">{file.name}</p><p className="text-xs text-green-600 mt-1 font-semibold">Siap diunggah - Klik untuk mengganti</p></div>):(<div className="text-center"><div className="w-16 h-16 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl"><i className="fas fa-cloud-upload-alt"></i></div><p className="font-bold text-slate-700">Klik atau Tarik file PDF ke sini</p><p className="text-xs text-slate-500 mt-1">Maksimal ukuran file 5MB</p></div>)}</div></div></div><div className="pt-6 border-t border-slate-100 flex justify-end"><button type="submit" disabled={loading} className="w-full md:w-auto px-8 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-500/30 hover:opacity-90 transition-all disabled:opacity-70 flex items-center justify-center gap-2">{loading?<i className="fas fa-spinner fa-spin"></i>:<i className="fas fa-paper-plane"></i>}{loading?'Memproses Pengiriman...':'Kirim Pengajuan'}</button></div></form>
        </div>
      );
    };

    // ======================= APP UTAMA =======================
    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [presensi, setPresensi] = useState([]);
      const [ijin, setIjin] = useState([]);
      const [pegawai, setPegawai] = useState([]);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const storedUser = localStorage.getItem('user');
        if (!storedUser) {
          window.location.href = '/';
          return;
        }
        setUser(JSON.parse(storedUser));
      }, []);

      const fetchData = async () => {
        if (!user) return;
        setLoading(true);
        try {
          const [resP, resI, resPg] = await Promise.all([
            callAPI('getPresensi'),
            callAPI('getIjin'),
            callAPI('getPegawai')
          ]);
          setPresensi(resP || []);
          setIjin(resI || []);
          setPegawai(resPg || []);
        } catch(e) { console.error(e); }
        setLoading(false);
      };

      useEffect(() => { if (user) fetchData(); }, [user]);

      const enrichedPresensi = useMemo(() => enrichPresensiWithIjin(presensi, ijin), [presensi, ijin]);
      const canAccessPegawai = user && (user.role === 'Admin' || user.role === 'Superuser' || user.role === 'User');
      const canEditAllLembaga = user && (user.role === 'Admin' || user.role === 'Superuser' || user.role === 'User');
      const userLembaga = !canEditAllLembaga ? (user ? user.role : '') : (user ? user.lembaga : '');

      const tabs = [
        { id:'dashboard', icon:'fa-chart-pie', label:'Dashboard Presensi' },
        { id:'monitoring_presensi', icon:'fa-clipboard-list', label:'Monitoring Presensi' },
        { id:'dokumen_ijin', icon:'fa-file-signature', label:'Dokumen Ijin (PSW)' },
        { id:'pengajuan_psw', icon:'fa-file-upload', label:'Pengajuan PSW' },
        ...(canAccessPegawai ? [{ id:'pegawai', icon:'fa-users', label:'Database Pegawai' }] : []),
        { id:'monitoring_export', icon:'fa-desktop', label:'Monitoring & Ekspor' },
        { id:'activity', icon:'fa-history', label:'Error Logs' }
      ];

      const handleLogout = () => {
        Swal.fire({ title:'Yakin ingin keluar?', text:'Anda akan kembali ke halaman login.', icon:'question', showCancelButton:true, confirmButtonColor:'#d33', cancelButtonColor:'#334155', confirmButtonText:'Ya, Keluar', cancelButtonText:'Batal' }).then((result) => {
          if (result.isConfirmed) {
            localStorage.removeItem('user');
            window.location.href = '/';
          }
        });
      };

      if (!user) return null;

      return (
        <div className="min-h-screen flex flex-col md:flex-row bg-slate-50">
          <div className="w-full md:w-72 bg-white text-slate-800 flex flex-col shadow-lg z-40 border-r border-slate-200">
            <div className="p-8 border-b border-slate-100 flex items-center gap-4 bg-gradient-to-br from-blue-600 to-blue-800"><div className="bg-white/20 w-12 h-12 rounded-2xl flex items-center justify-center shadow-inner overflow-hidden"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Lambang_Kabupaten_Ngawi_%28svg%29.svg/1280px-Lambang_Kabupaten_Ngawi_%28svg%29.svg.png" alt="Logo Ngawi" className="w-full h-full object-cover" /></div><div><span className="font-black text-xl tracking-tight text-white block">KORWIL SINE</span><span className="text-[10px] text-blue-200 font-bold uppercase tracking-widest">Dashboard Monitoring</span></div></div>
            <nav className="flex-1 p-6 space-y-2">{tabs.map(tab => (<button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all duration-300 ${activeTab === tab.id ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}><i className={`fas ${tab.icon} w-6 text-center text-lg`}></i> {tab.label}</button>))}</nav>
            <div className="p-6 border-t border-slate-200 bg-slate-50"><div className="flex items-center gap-4 mb-6 px-2"><div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center border-2 border-blue-300 text-blue-600 font-black">{user.nama.charAt(0)}</div><div className="overflow-hidden"><div className="text-xs text-slate-500 font-bold uppercase tracking-tighter">Petugas:</div><div className="font-black text-sm text-slate-800 truncate">{user.nama}</div><div className="mt-1"><span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full text-[8px] font-black uppercase tracking-wider">{user.role}</span></div>{userLembaga && (<div className="mt-1 text-[10px] text-slate-400"><i className="fas fa-building mr-1"></i>{userLembaga}</div>)}</div></div><button onClick={handleLogout} className="w-full bg-white hover:bg-red-50 text-red-500 hover:text-red-700 py-3 rounded-xl font-bold transition-all border border-red-200 flex items-center justify-center gap-2 shadow-sm"><i className="fas fa-power-off"></i> KELUAR</button></div>
          </div>
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="bg-white border-b px-8 py-5 flex justify-between items-center z-30 shadow-sm"><h2 className="text-2xl font-black text-slate-800 capitalize flex items-center gap-3"><span className="w-2 h-8 bg-blue-600 rounded-full"></span>{activeTab==='dashboard'&&'Dashboard Presensi'}{activeTab==='monitoring_presensi'&&'Monitoring Presensi'}{activeTab==='dokumen_ijin'&&'Dokumen Ijin (PSW)'}{activeTab==='pengajuan_psw'&&'Pengajuan PSW'}{activeTab==='pegawai'&&'Database Pegawai'}{activeTab==='monitoring_export'&&'Monitoring & Ekspor'}{activeTab==='activity'&&'Log Monitoring'}</h2><button onClick={fetchData} className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all border ${loading?'bg-blue-50 border-blue-200':'bg-white border-slate-200 hover:bg-blue-50'}`}><i className={`fas fa-sync-alt text-lg ${loading?'fa-spin text-blue-600':'text-slate-500'}`}></i></button></header>
            <div className="flex-1 overflow-auto p-4 md:p-8">
              {loading && presensi.length===0 && activeTab!=='pegawai' ? (<div className="h-full flex flex-col items-center justify-center space-y-6"><div className="loader border-4 border-blue-100 border-t-blue-600 rounded-full w-16 h-16"></div><div className="text-center"><span className="text-slate-800 font-black text-xl block">Menghubungkan ke Server...</span><span className="text-slate-400 text-sm">Sedang sinkronisasi</span></div></div>) : (<div className="max-w-7xl mx-auto">{activeTab==='dashboard'&&<Dashboard presensiData={enrichedPresensi} ijinData={ijin} pegawaiData={pegawai} />}{activeTab==='monitoring_presensi'&&<MonitoringPresensi data={enrichedPresensi} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}{activeTab==='dokumen_ijin'&&<DokumenIjin data={ijin} refreshData={fetchData} userRole={user.role} userLembaga={userLembaga} />}{activeTab==='pengajuan_psw'&&<PengajuanPSW user={user} />}{activeTab==='pegawai'&&canAccessPegawai&&<DatabasePegawai refreshParent={fetchData} userRole={user.role} />}{activeTab==='monitoring_export'&&<MonitoringExport presensiData={enrichedPresensi} ijinData={ijin} pegawaiData={pegawai} refreshData={fetchData} userRole={user.role} />}{activeTab==='activity'&&<ActivityLog userRole={user.role} />}</div>)}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
